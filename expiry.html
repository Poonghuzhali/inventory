<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expiry Tracker - GroceryGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="lg:hidden bg-slate-900 text-white p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold">Grocery<span class="text-emerald-400">Go</span></h1>
        <button id="menu-toggle" class="p-2 bg-slate-800 rounded-md">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
    </header>

    <div class="flex h-screen overflow-hidden">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-white transform -translate-x-full transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-0">
            <div class="flex flex-col h-full">
                <div class="p-6 text-2xl font-bold border-b border-slate-800 hidden lg:block">
                    Grocery<span class="text-emerald-400">Go</span>
                </div>
                <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                    <a href="index.html" class="flex items-center p-3 hover:bg-slate-800 rounded-lg transition-colors text-slate-300 hover:text-white">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                        Dashboard
                    </a>
                    <a href="inventory.html" class="flex items-center p-3 hover:bg-slate-800 rounded-lg transition-colors text-slate-300 hover:text-white">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                        Inventory
                    </a>
                    <a href="expiry.html" class="flex items-center p-3 bg-emerald-600 rounded-lg text-white font-semibold">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Expiry Tracker
                    </a>
                    <a href="supplier.html" class="flex items-center p-3 hover:bg-slate-800 rounded-lg transition-colors text-slate-300 hover:text-white">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        Suppliers
                    </a>
                </nav>
                <div class="p-4 border-t border-slate-800">
                    <div class="flex items-center p-2 bg-slate-800 rounded-lg">
                        <div class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center font-bold">P</div>
                        <div class="ml-3">
                            <p class="text-xs font-semibold">Admin</p>
                            <p class="text-[10px] text-slate-400">Manager View</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-y-auto">
            <div class="p-4 md:p-8 max-w-7xl w-full mx-auto">
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-slate-800">Expiry Tracker</h2>
                    <p class="text-slate-500">Products sorted by expiry date — soonest first.</p>
                </div>

                <div class="mb-6 flex flex-col sm:flex-row gap-3">
                    <div class="relative flex-1">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input id="expiry-search" type="text" placeholder="Search by name, SKU, or invoice..." class="w-full pl-10 pr-4 py-2.5 bg-white border border-gray-200 text-slate-700 text-sm rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
                    </div>
                    <button id="expiry-download-btn" class="bg-white border border-gray-200 text-slate-600 px-5 py-2.5 rounded-lg text-sm font-semibold hover:bg-gray-50 transition flex items-center gap-2 whitespace-nowrap">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Download CSV
                    </button>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 text-slate-500 text-xs uppercase tracking-widest">
                                <tr>
                                    <th class="p-4">Product</th>
                                    <th class="p-4">SKU</th>
                                    <th class="p-4">Barcode</th>
                                    <th class="p-4">Invoice</th>
                                    <th class="p-4">Supplier</th>
                                    <th class="p-4">Category</th>
                                    <th class="p-4">Unit</th>
                                    <th class="p-4">Price</th>
                                    <th class="p-4">Stock</th>
                                    <th class="p-4">Expiry Date</th>
                                    <th class="p-4">Status</th>
                                </tr>
                            </thead>
                            <tbody id="expiry-data-body" class="divide-y divide-gray-100">
                                <tr>
                                    <td colspan="11" class="p-10 text-center text-gray-500">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/expiry.js"></script>
</body>
</html>
